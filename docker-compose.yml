version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ctf-collection-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-ctf_collection}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  app:
    build: ./server
    container_name: ctf-collection-app-prod
    # App runs internally only; the frontend will be served to the public.
    # Do not expose the backend directly to the internet in this setup.
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-ctf_collection}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      SUBMISSIONS_PATH: /data/submissions
      FRONTEND_URL: ${FRONTEND_URL}
      TRUST_PROXY: 'true'
    volumes:
      - submissions_prod:/data/submissions:rw
    depends_on:
      - mysql
    restart: unless-stopped

  client:
    build: ./client
    container_name: ctf-collection-client-prod
    environment:
      - CHOKIDAR_USEPOLLING=true
      - BROWSER=none
      - REACT_APP_API_URL=http://ctf-collection-app-prod:5000/api
    ports:
      - "80:3000"
    depends_on:
      - app

volumes:
  mysql_data_prod:
  submissions_prod:
